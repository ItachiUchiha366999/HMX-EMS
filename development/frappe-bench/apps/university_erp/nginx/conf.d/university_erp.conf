# University ERP Site Configuration

upstream frappe-backend {
    server backend:8000;
    keepalive 32;
}

upstream socketio-backend {
    server backend:9000;
    keepalive 32;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name _;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    root /home/frappe/frappe-bench/sites;

    # Proxy settings
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Static files
    location /assets {
        alias /home/frappe/frappe-bench/sites/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker (no caching)
    location /sw.js {
        alias /home/frappe/frappe-bench/sites/assets/university_erp/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # PWA manifest
    location /manifest.json {
        alias /home/frappe/frappe-bench/sites/assets/university_erp/manifest.json;
        add_header Cache-Control "no-cache";
    }

    # Protected files
    location /protected {
        internal;
        alias /home/frappe/frappe-bench/sites;
    }

    # Socket.io
    location /socket.io {
        proxy_pass http://socketio-backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API rate limiting
    location /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://frappe-backend;
    }

    # Login rate limiting
    location /api/method/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://frappe-backend;
    }

    # Webhook endpoints (allow guest)
    location /api/method/university_erp.university_erp.api.webhooks {
        proxy_pass http://frappe-backend;
    }

    # All other requests
    location / {
        try_files /university.local/public/$uri @backend;
    }

    location @backend {
        proxy_pass http://frappe-backend;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
