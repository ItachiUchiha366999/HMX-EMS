<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal | EduPortal</title>

    <!-- Fonts -- same as student portal for consistency -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

    <!-- Design system tokens — required for all component styling -->
    <link rel="stylesheet" href="/assets/university_erp/css/theme/variables.css">
    <link rel="stylesheet" href="/assets/university_erp/css/theme/base.css">
    <link rel="stylesheet" href="/assets/university_erp/css/theme/components.css">

    {% if vue_css %}
    <link rel="stylesheet" href="{{ vue_css }}">
    {% endif %}

    <style>
        /* Loading spinner before Vue mounts */
        body { margin: 0; }
        #app:empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f8fafc;
            font-family: 'Lexend', sans-serif;
        }
        #app:empty::after {
            content: '';
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: #135bec;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (prefers-color-scheme: dark) {
            #app:empty { background: #0d121b; }
            #app:empty::after { border-color: #334155; border-top-color: #135bec; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Inject Frappe session context for the Vue app
        window.frappe = window.frappe || {};
        window.frappe.csrf_token = "{{ frappe.session.csrf_token }}";
        window.frappe.session = { user: "{{ frappe.session.user }}" };
    </script>

    {% if vue_js %}
    <script type="module" src="{{ vue_js }}"></script>
    {% else %}
    <script>
        document.getElementById('app').innerHTML = '<div style="text-align:center;padding:80px 20px;font-family:Lexend,sans-serif;color:#64748b;"><h2 style="color:#0f172a;">University Portal</h2><p>Build assets not found. Please run <code>cd portal-vue && npm install && npm run build</code></p></div>';
    </script>
    {% endif %}
</body>
</html>
